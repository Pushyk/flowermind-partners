<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flowermind — стати партнером</title>
<style>
  :root {
    --bg: #0F0E13;
    --bg-card: #17151C;
    --border: #29252F;
    --text-primary: #EDEAE3;
    --text-muted: #8B8794;
    --accent-from: #FF6B9D;
    --accent-to: #8B5CF6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px 60px; }
  .lang-switch {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 24px;
  }
  .lang-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .lang-btn.active {
    color: #fff;
    border-color: var(--accent-from);
    background: var(--accent-from);
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent-from), var(--accent-to));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
  }
  h1 { font-size: 26px; margin: 8px 0 4px; }
  .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 28px; }
  .benefits {
    display: grid;
    gap: 12px;
    margin-bottom: 32px;
  }
  .benefit {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 14px;
  }
  .benefit .emoji { font-size: 20px; }
  form { display: grid; gap: 14px; }
  .field label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field input,
  .field select,
  .field textarea {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: inherit;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--accent-from);
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  textarea { resize: vertical; min-height: 70px; }
  .submit-btn {
    margin-top: 8px;
    background: linear-gradient(90deg, var(--accent-from), var(--accent-to));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .submit-btn:disabled { opacity: 0.6; cursor: default; }
  .note {
    font-size: 12.5px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 10px;
  }
  .banner {
    display: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 14px;
    margin-bottom: 18px;
  }
  .banner.show { display: block; }
  .banner.success { background: rgba(74, 222, 128, 0.12); border: 1px solid #4ADE80; color: #4ADE80; }
  .banner.error { background: rgba(248, 113, 113, 0.12); border: 1px solid #F87171; color: #F87171; }
  .required { color: var(--accent-from); }
</style>
</head>
<body>
<div class="wrap">
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="uk" onclick="setLang('uk')">UA</button>
    <button class="lang-btn" data-lang="pl" onclick="setLang('pl')">PL</button>
  </div>

  <div class="logo">Flowermind</div>
  <h1 data-i18n="title"></h1>
  <p class="subtitle" data-i18n="subtitle"></p>

  <div class="benefits">
    <div class="benefit"><span class="emoji">💸</span><span data-i18n="benefit1"></span></div>
    <div class="benefit"><span class="emoji">📱</span><span data-i18n="benefit2"></span></div>
    <div class="benefit"><span class="emoji">🌍</span><span data-i18n="benefit3"></span></div>
  </div>

  <div id="successBanner" class="banner success"></div>
  <div id="errorBanner" class="banner error"></div>

  <form id="applyForm">
    <div class="field">
      <label data-i18n="lblCompany"></label>
      <input type="text" id="companyName" required />
    </div>

    <div class="row2">
      <div class="field">
        <label data-i18n="lblCountry"></label>
        <select id="country"></select>
      </div>
      <div class="field">
        <label data-i18n="lblCity"></label>
        <input type="text" id="city" required />
      </div>
    </div>

    <div class="field">
      <label data-i18n="lblType"></label>
      <select id="businessType" required>
        <option value="florist" data-i18n="typeFlorist"></option>
        <option value="gift_shop" data-i18n="typeGift"></option>
        <option value="confectioner" data-i18n="typeConfectioner"></option>
        <option value="certificates" data-i18n="typeCertificates"></option>
      </select>
    </div>

    <div class="row2">
      <div class="field">
        <label id="taxIdLabel"></label>
        <input type="text" id="taxId" required />
      </div>
      <div class="field" id="secondaryIdField">
        <label id="secondaryIdLabel"></label>
        <input type="text" id="secondaryId" />
      </div>
    </div>

    <div class="field">
      <label data-i18n="lblContactName"></label>
      <input type="text" id="contactName" required />
    </div>

    <div class="row2">
      <div class="field">
        <label data-i18n="lblPhone"></label>
        <input type="tel" id="contactPhone" required />
      </div>
      <div class="field">
        <label data-i18n="lblEmail"></label>
        <input type="email" id="contactEmail" />
      </div>
    </div>

    <div class="field">
      <label data-i18n="lblMessage"></label>
      <textarea id="message"></textarea>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn" data-i18n="submitBtn"></button>
    <p class="note" data-i18n="reviewNote"></p>
  </form>
</div>

<script>
  var SUPABASE_URL = "https://wdkntigydzioidhhktcb.supabase.co";
  var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indka250aWd5ZHppb2lkaGhrdGNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMzgxMzgsImV4cCI6MjA5ODkxNDEzOH0.tnbdFXrO_aytdjxasUmtAzouJSaSi3P133HuDq6mveQ";

  // Mirrors src/constants/countries.js — only Poland has a second identifier
  // (REGON) alongside its primary tax id; everywhere else that field is hidden.
  var COUNTRIES = [
    { code: "PL", name: "Polska", taxIdLabel: "NIP", secondaryIdLabel: "REGON" },
    { code: "UA", name: "Україна", taxIdLabel: "ЄДРПОУ / ІПН", secondaryIdLabel: null },
    { code: "US", name: "United States", taxIdLabel: "EIN", secondaryIdLabel: null },
    { code: "CA", name: "Canada", taxIdLabel: "Business Number (BN)", secondaryIdLabel: null },
    { code: "GB", name: "United Kingdom", taxIdLabel: "Company Number / UTR", secondaryIdLabel: null },
    { code: "EU", name: "Інша країна ЄС", taxIdLabel: "VAT number", secondaryIdLabel: null },
  ];

  var i18n = {
    uk: {
      title: "Стань партнером Flowermind",
      subtitle: "Продавай квіти, подарунки, торти чи сертифікати новим клієнтам без витрат наперед — заявка розглядається вручну, після схвалення ми надішлемо код доступу.",
      benefit1: "Без передоплати — комісія лише з реальних продажів",
      benefit2: "Керуй каталогом і замовленнями просто з телефону",
      benefit3: "Нові клієнти з усього міста, без власної реклами",
      lblCompany: "Назва компанії *",
      lblCountry: "Країна *",
      lblCity: "Місто *",
      lblType: "Тип партнерства *",
      typeFlorist: "Флорист / квітковий магазин",
      typeGift: "Магазин подарунків",
      typeConfectioner: "Кондитерська",
      typeCertificates: "Магазин сертифікатів",
      lblContactName: "Контактна особа *",
      lblPhone: "Телефон *",
      lblEmail: "Email",
      lblMessage: "Коментар (необов'язково)",
      submitBtn: "Надіслати заявку",
      reviewNote: "Заявку розглядає команда Flowermind вручну — це не миттєва реєстрація.",
      successMsg: "Дякуємо! Заявку надіслано. Ми зв'яжемось з вами найближчим часом.",
      errorMsg: "Не вдалося надіслати заявку. Перевір з'єднання й спробуй ще раз.",
      errorRequired: "Заповни всі обов'язкові поля.",
    },
    pl: {
      title: "Zostań partnerem Flowermind",
      subtitle: "Sprzedawaj kwiaty, prezenty, torty lub certyfikaty nowym klientom bez kosztów z góry — wniosek jest rozpatrywany ręcznie, po zatwierdzeniu wyślemy kod dostępu.",
      benefit1: "Bez przedpłaty — prowizja tylko od realnej sprzedaży",
      benefit2: "Zarządzaj katalogiem i zamówieniami prosto z telefonu",
      benefit3: "Nowi klienci z całego miasta, bez własnej reklamy",
      lblCompany: "Nazwa firmy *",
      lblCountry: "Kraj *",
      lblCity: "Miasto *",
      lblType: "Typ partnerstwa *",
      typeFlorist: "Kwiaciarnia",
      typeGift: "Sklep z prezentami",
      typeConfectioner: "Cukiernia",
      typeCertificates: "Sklep z certyfikatami",
      lblContactName: "Osoba kontaktowa *",
      lblPhone: "Telefon *",
      lblEmail: "Email",
      lblMessage: "Komentarz (opcjonalnie)",
      submitBtn: "Wyślij zgłoszenie",
      reviewNote: "Zgłoszenie jest rozpatrywane ręcznie przez zespół Flowermind — to nie jest natychmiastowa rejestracja.",
      successMsg: "Dziękujemy! Zgłoszenie zostało wysłane. Skontaktujemy się wkrótce.",
      errorMsg: "Nie udało się wysłać zgłoszenia. Sprawdź połączenie i spróbuj ponownie.",
      errorRequired: "Wypełnij wszystkie wymagane pola.",
    },
  };

  var currentLang = "uk";

  var countrySelect = document.getElementById("country");
  COUNTRIES.forEach(function (c) {
    var opt = document.createElement("option");
    opt.value = c.code;
    opt.textContent = c.name;
    countrySelect.appendChild(opt);
  });

  function updateIdLabels() {
    var c = COUNTRIES.filter(function (x) { return x.code === countrySelect.value; })[0] || COUNTRIES[0];
    document.getElementById("taxIdLabel").textContent = c.taxIdLabel + " *";
    var secondaryField = document.getElementById("secondaryIdField");
    if (c.secondaryIdLabel) {
      secondaryField.style.display = "";
      document.getElementById("secondaryIdLabel").textContent = c.secondaryIdLabel;
      document.getElementById("secondaryId").required = true;
    } else {
      secondaryField.style.display = "none";
      document.getElementById("secondaryId").required = false;
      document.getElementById("secondaryId").value = "";
    }
  }
  countrySelect.addEventListener("change", updateIdLabels);
  updateIdLabels();

  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll(".lang-btn").forEach(function (btn) {
      btn.classList.toggle("active", btn.getAttribute("data-lang") === lang);
    });
    document.querySelectorAll("[data-i18n]").forEach(function (el) {
      var key = el.getAttribute("data-i18n");
      if (i18n[lang][key] != null) el.textContent = i18n[lang][key];
    });
    document.documentElement.lang = lang;
  }

  function showBanner(el, otherEl, text) {
    otherEl.classList.remove("show");
    el.textContent = text;
    el.classList.add("show");
  }

  document.getElementById("applyForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var successBanner = document.getElementById("successBanner");
    var errorBanner = document.getElementById("errorBanner");
    successBanner.classList.remove("show");
    errorBanner.classList.remove("show");

    var selectedCountry = COUNTRIES.filter(function (x) { return x.code === countrySelect.value; })[0] || COUNTRIES[0];
    var payload = {
      p_company_name: document.getElementById("companyName").value.trim(),
      p_city: document.getElementById("city").value.trim(),
      p_country: countrySelect.value,
      p_tax_id: document.getElementById("taxId").value.trim(),
      p_secondary_id: document.getElementById("secondaryId").value.trim() || null,
      p_business_type: document.getElementById("businessType").value,
      p_contact_name: document.getElementById("contactName").value.trim(),
      p_contact_phone: document.getElementById("contactPhone").value.trim(),
      p_contact_email: document.getElementById("contactEmail").value.trim() || null,
      p_message: document.getElementById("message").value.trim() || null,
    };

    if (
      !payload.p_company_name || !payload.p_city || !payload.p_tax_id ||
      (selectedCountry.secondaryIdLabel && !payload.p_secondary_id) ||
      !payload.p_contact_name || !payload.p_contact_phone
    ) {
      showBanner(errorBanner, successBanner, i18n[currentLang].errorRequired);
      return;
    }

    var submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;

    fetch(SUPABASE_URL + "/rest/v1/rpc/submit_partner_application", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      },
      body: JSON.stringify(payload),
    })
      .then(function (res) {
        if (!res.ok) throw new Error("request failed");
        showBanner(successBanner, errorBanner, i18n[currentLang].successMsg);
        document.getElementById("applyForm").reset();
        updateIdLabels();
      })
      .catch(function () {
        showBanner(errorBanner, successBanner, i18n[currentLang].errorMsg);
      })
      .finally(function () {
        submitBtn.disabled = false;
      });
  });

  setLang("uk");
</script>
</body>
</html>
